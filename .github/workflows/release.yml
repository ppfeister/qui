name: Release

on:
  push:
    branches:
      - "main"
      - "develop"
    tags:
      - "v*"
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/images/**"
      - "config.toml"
      - "distrib/docker/docker-compose.yml"
      - "Makefile"
      - "**.md"
      - "documentation/**"
  pull_request:
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/images/**"
      - "config.toml"
      - "distrib/docker/docker-compose.yml"
      - "Makefile"
      - "**.md"
      - "documentation/**"

env:
  REGISTRY: ghcr.io
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
  NODE_VERSION: "22.18.0"
  POLAR_ORG_ID: ${{ secrets.POLAR_ORG_ID }}

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  web:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Fetch premium themes
        run: |
          if [ -n "${{ secrets.THEMES_REPO_TOKEN }}" ]; then
            rm -rf .themes-temp
            git clone --depth=1 --filter=blob:none --sparse \
              https://${{ secrets.THEMES_REPO_TOKEN }}@github.com/autobrr/qui-premium-themes.git .themes-temp
            cd .themes-temp && git sparse-checkout set --cone themes && cd ..
            mkdir -p web/src/themes/premium
            cp .themes-temp/themes/*.css web/src/themes/premium/
            rm -rf .themes-temp
            echo "Premium themes fetched successfully"
          else
            echo "THEMES_REPO_TOKEN not set, skipping premium themes"
          fi

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Type check and build frontend
        working-directory: web
        run: |
          pnpm tsc --noEmit &
          TSC_PID=$!
          CI= pnpm run build &
          BUILD_PID=$!
          wait $TSC_PID || exit 1
          wait $BUILD_PID || exit 1

      - name: Upload web production build
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist

  goreleaserbuild:
    name: Build distribution binaries
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [test, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download web production build
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Prepare release signing key
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          test -n "$RELEASE_SIGNING_PRIVATE_KEY"
          key_file="$RUNNER_TEMP/release-signing-key.pem"
          printf '%s' "$RELEASE_SIGNING_PRIVATE_KEY" > "$key_file"
          chmod 600 "$key_file"
          echo "RELEASE_SIGNING_KEY_FILE=$key_file" >> "$GITHUB_ENV"

      - name: Verify release signing key matches embedded updater cert
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cert_public_key_file="$RUNNER_TEMP/release-signing-cert.pub.der"
          signing_public_key_file="$RUNNER_TEMP/release-signing-key.pub.der"

          openssl x509 -in internal/update/release_signing_cert.pem -pubkey -noout |
            openssl pkey -pubin -outform DER > "$cert_public_key_file"
          openssl pkey -in "$RELEASE_SIGNING_KEY_FILE" -pubout -outform DER > "$signing_public_key_file"

          if ! cmp -s "$cert_public_key_file" "$signing_public_key_file"; then
            echo "::error::RELEASE_SIGNING_PRIVATE_KEY does not match internal/update/release_signing_cert.pem"
            exit 1
          fi

      - name: Run GoReleaser build and publish tags
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .goreleaser.release.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILDER: ${{ github.actor }}@github-actions
          RELEASE_SIGNING_KEY_FILE: ${{ env.RELEASE_SIGNING_KEY_FILE }}

      - name: Upload assets
        uses: actions/upload-artifact@v7
        with:
          name: qui
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm

  goreleasersignedsmoke:
    name: PR signed release smoke test (ephemeral key)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download web production build
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Cache Go build artifacts
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Prepare ephemeral release signing key
        run: |
          key_file="$RUNNER_TEMP/release-signing-key.pem"
          openssl ecparam -name prime256v1 -genkey -noout -out "$key_file"
          chmod 600 "$key_file"
          echo "RELEASE_SIGNING_KEY_FILE=$key_file" >> "$GITHUB_ENV"
          echo "POLAR_ORG_ID=00000000-0000-0000-0000-000000000000" >> "$GITHUB_ENV"

      - name: Run signed GoReleaser smoke build
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --config .goreleaser.release.yml --parallelism 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILDER: ${{ github.actor }}@github-actions
          POLAR_ORG_ID: ${{ env.POLAR_ORG_ID }}
          RELEASE_SIGNING_KEY_FILE: ${{ env.RELEASE_SIGNING_KEY_FILE }}

      - name: Verify signed checksum signature
        run: |
          public_key_file="$RUNNER_TEMP/release-signing-key.pub.pem"
          openssl pkey -in "$RELEASE_SIGNING_KEY_FILE" -pubout -out "$public_key_file"
          openssl dgst -sha256 \
            -verify "$public_key_file" \
            -signature dist/checksums.txt.sig \
            dist/checksums.txt

  docker-matrix:
    name: Determine Docker platforms
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.set.outputs.platforms }}
    steps:
      - id: set
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo 'platforms=["linux/amd64","linux/arm64"]' >> "$GITHUB_OUTPUT"
          else
            echo 'platforms=["linux/amd64","linux/amd64/v2","linux/amd64/v3","linux/arm/v6","linux/arm/v7","linux/arm64"]' >> "$GITHUB_OUTPUT"
          fi

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [web, docker-matrix]
    strategy:
      fail-fast: true
      matrix:
        platform: ${{ fromJSON(needs.docker-matrix.outputs.platforms) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download web production build
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}},prefix=v
            type=semver,pattern={{major}}.{{minor}},prefix=v
            type=ref,event=branch
            type=ref,event=pr
          flavor: |
            latest=auto

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./distrib/docker/ci.Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ (github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request') && 'true' || 'false' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
            BUILDER=${{ github.actor }}@github-actions
            POLAR_ORG_ID=${{ env.POLAR_ORG_ID }}
          provenance: false

      - name: Export image digest
        id: digest-prep
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.docker_build.outputs.digest }}"
          echo "manifest-hash=${digest#sha256:}" >> "$GITHUB_OUTPUT"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digests-${{ steps.digest-prep.outputs.manifest-hash }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Publish Docker multi-arch manifest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: [docker, test]
    steps:
      - name: Download image digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: docker-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}},prefix=v
            type=semver,pattern={{major}}.{{minor}},prefix=v
            type=ref,event=branch
            type=ref,event=pr
          flavor: |
            latest=auto

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create placeholder web dist for embed
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            go test -v -coverprofile=coverage.out ./...
          else
            go test -v -race -coverprofile=coverage.out ./...
          fi
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
